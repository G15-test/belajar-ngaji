<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Ngaji Calon Imam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #f0fdf4; font-family: sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .arabic { font-family: 'Amiri', serif; font-size: 2.2rem; line-height: 4.5rem; text-align: right; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-green-800">Jurnal Ngaji & Ibadah</h1>
            <div class="mt-3 inline-block bg-white px-6 py-2 rounded-full text-sm font-bold text-orange-600 shadow-sm border border-orange-100">
                📿 Istighfar 100x & Jaga Shalat
            </div>
        </div>

        <!-- Tab Menu -->
        <div class="flex flex-wrap justify-center gap-2 mb-6">
            <button onclick="showTab('progres')" class="bg-green-700 text-white px-5 py-2 rounded-full shadow-md">📊 Progres</button>
            <button onclick="showTab('iqro')" class="bg-green-600 text-white px-5 py-2 rounded-full shadow-md">📖 Belajar Iqro</button>
            <button onclick="showTab('quran')" class="bg-green-600 text-white px-5 py-2 rounded-full shadow-md">🕌 Al-Qur'an</button>
        </div>

        <!-- 1. TAB PROGRES -->
        <div id="progres" class="tab-content active bg-white p-6 rounded-2xl shadow-lg border-b-8 border-green-500">
            <h2 class="text-xl font-bold mb-4">Target Capaian</h2>
            <div class="space-y-3">
                <label class="flex items-center p-4 bg-green-50 rounded-xl cursor-pointer">
                    <input type="checkbox" class="w-6 h-6 mr-4"> <span>Lancar Iqro 1 - 6</span>
                </label>
                <label class="flex items-center p-4 bg-green-50 rounded-xl cursor-pointer">
                    <input type="checkbox" class="w-6 h-6 mr-4"> <span>Hafal Surat-Surat Pendek</span>
                </label>
            </div>
        </div>

        <!-- 2. TAB IQRO (Link Langsung PDF) -->
        <div id="iqro" class="tab-content bg-white p-4 rounded-2xl shadow-lg border-b-8 border-blue-500">
            <h2 class="text-xl font-bold mb-4 text-blue-800">Buku Iqro Digital</h2>
            <p class="mb-4 text-sm text-gray-600">Klik tombol di bawah untuk membuka buku Iqro lengkap:</p>
            <a href="https://archive.org" target="_blank" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:bg-blue-700">
                📖 Buka Buku Iqro (PDF)
            </a>
            <p class="mt-4 text-xs text-gray-400 font-italic">*Iqro akan terbuka di tab baru agar lebih mudah dibaca.</p>
        </div>

        <!-- 3. TAB QURAN (API Baru yang Lebih Stabil) -->
        <div id="quran" class="tab-content bg-white p-6 rounded-2xl shadow-lg border-b-8 border-emerald-600">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-emerald-800">Al-Qur'an Digital</h2>
                <select id="surahSelect" onchange="loadSurah(this.value)" class="p-2 border rounded-lg bg-emerald-50">
                    <option value="">Pilih Surah...</option>
                </select>
            </div>
            <div id="quranList" class="space-y-8 max-h-[500px] overflow-y-auto pr-2">
                <div class="text-center py-10 text-gray-400 italic">Silakan pilih surah untuk mulai mengaji.</div>
            </div>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function init() {
            const res = await fetch('https://equran.id');
            const data = await res.json();
            const select = document.getElementById('surahSelect');
            data.data.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.nomor;
                opt.text = `${s.nomor}. ${s.namaLatin} (${s.nama})`;
                select.appendChild(opt);
            });
        }

        async function loadSurah(nomor) {
            if(!nomor) return;
            const list = document.getElementById('quranList');
            list.innerHTML = '<div class="text-center py-10 italic text-green-600">Memuat Kalamullah...</div>';
            
            try {
                const res = await fetch(`https://equran.id/${nomor}`);
                const json = await res.json();
                const surah = json.data;
                
                list.innerHTML = '';
                surah.ayat.forEach(a => {
                    list.innerHTML += `
                        <div class="pb-6 border-b border-gray-100">
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold">${a.nomorAyat}</span>
                                <audio controls class="h-8 scale-90"><source src="${a.audio['01']}" type="audio/mpeg"></audio>
                            </div>
                            <p class="arabic mb-4">${a.teksArab}</p>
                            <p class="text-gray-600 text-sm italic">${a.teksIndonesia}</p>
                        </div>
                    `;
                });
            } catch (e) {
                list.innerHTML = '<p class="text-red-500 text-center">Maaf, gagal memuat surah. Coba lagi nanti.</p>';
            }
        }
        init();
    </script>
</body>
</html>
