<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ngaji App Super</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header>

<h1>📿 Ngaji App</h1>

<button onclick="toggleDark()">🌙</button>

</header>


<nav>

<button onclick="showTab('quran')">Qur'an</button>
<button onclick="showTab('dzikir')">Dzikir</button>
<button onclick="showTab('tracker')">Tracker</button>
<button onclick="showTab('bookmark')">Bookmark</button>

</nav>


<section id="quran" class="tab active">

<select id="surahSelect"></select>

<div id="quranList"></div>

</section>


<section id="dzikir" class="tab">

<h2>Dzikir Counter</h2>

<button onclick="countDzikir()">📿 Tasbih</button>

<p id="dzikirCount">0</p>

</section>


<section id="tracker" class="tab">

<h2>Checklist Ibadah</h2>

<label><input type="checkbox" id="shubuh"> Shubuh</label>
<label><input type="checkbox" id="dzuhur"> Dzuhur</label>
<label><input type="checkbox" id="ashar"> Ashar</label>
<label><input type="checkbox" id="maghrib"> Maghrib</label>
<label><input type="checkbox" id="isya"> Isya</label>

</section>


<section id="bookmark" class="tab">

<h2>Ayat Tersimpan</h2>

<div id="bookmarkList"></div>

</section>

</div>

<script src="app.js"></script>

</body>
</html>
